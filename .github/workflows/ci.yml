name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish
      run: |
        dotnet publish src/MacroDeck.HardwareMonitor `
          --configuration Release `
          --output publish

    - name: Create Release Asset
      run: |
        Compress-Archive -Path publish/* -DestinationPath MacroDeck.HardwareMonitor.zip

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: MacroDeck.HardwareMonitor.zip
